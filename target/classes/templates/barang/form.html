<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Barang</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand"><span>🥐</span><h2>Bakery Admin</h2></div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><span></span> Dashboard</a>
                <a href="/barang" class="nav-item active"><span></span> Barang</a>
                <a href="/logout" class="nav-item logout-nav"><span></span> Keluar</a>
            </nav>
        </aside>

        <main class="main-content">
            <h2 th:text="${mode == 'tambah'} ? 'Tambah Barang' : 'Edit Barang'"></h2>

            <form th:action="${mode == 'tambah'} ? @{/barang/simpan} : @{/barang/update}" th:object="${barang}" method="post">
                <label>Kode Barang</label>
                <input type="text" th:field="*{kodeBarang}" th:readonly="${mode == 'edit'}">

                <label>Nama Barang</label>
                <input type="text" th:field="*{namaBarang}">

                <label>Kategori</label>
                <input type="text" th:field="*{kategori}">

                <label>Harga</label>
                <input type="number" th:field="*{harga}">

                <label>Stok</label>
                <input type="number" th:field="*{stok}">

                <button type="submit">Simpan</button>
                <a href="/barang" class="btn-secondary">Batal</a>
            </form>
        </main>
    </div>
</body>
</html>
